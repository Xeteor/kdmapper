name: Build My Fork
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # kdmapper often uses NuGet for dependencies
      - name: Restore NuGet Packages
        run: nuget restore kdmapper.sln

      - name: Build Solution
        # Using the correct name: kdmapper.sln
        run: msbuild kdmapper.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: kdmapper-binary
          path: |
            **/Release/*.exe
            **/Release/*.sys
